apiVersion: apps/v1
kind: Deployment
metadata: { name: phishforge, labels: { app: phishforge } }
spec:
  replicas: 1
  selector: { matchLabels: { app: phishforge } }
  template:
    metadata: { labels: { app: phishforge } }
    spec:
      containers:
        - name: phishforge
          image: ghcr.io/cognis-digital/phishforge:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: phishforge }
spec:
  selector: { app: phishforge }
  ports: [{ port: 80, targetPort: 8000 }]
